<div class="js-card" data-audio-duration-ms="{{AudioDurationMs}}">
  <div class="js-card__inner">
    {{#Screenshot}}
    <div class="js-screenshot">
      {{Screenshot}}
      {{#Audio}}<div class="js-audio js-audio--overlay">{{Audio}}</div>{{/Audio}}
    </div>
    {{/Screenshot}}

    {{^Screenshot}}
    {{#Audio}}<div class="js-audio">{{Audio}}</div>{{/Audio}}
    {{/Screenshot}}

    <div class="js-section js-section--word">
      <div class="js-target-word">{{TargetWord}}</div>
    </div>
  </div>
</div>

<script>
(function() {
  // Flip the replay button's icon from play→pause when the user clicks it (or
  // when the back side autoplays it), and back to play once the clip ends.
  // Duration comes from the AudioDurationMs field; missing/zero → no flip.
  var card = document.querySelector('.js-card[data-audio-duration-ms]');
  if (!card) return;
  var ms = parseInt(card.getAttribute('data-audio-duration-ms') || '0', 10) || 0;
  var btn = card.querySelector('.replay-button, .replaybutton');
  if (!btn) return;
  var w = window;
  function flip(playing) {
    btn.classList.toggle('playing', !!playing);
    if (w._asAudioTimer) { clearTimeout(w._asAudioTimer); w._asAudioTimer = null; }
    if (playing && ms > 0) {
      w._asAudioTimer = setTimeout(function() { btn.classList.remove('playing'); }, ms);
    }
  }
  // Idempotent rebind: {{FrontSide}} re-runs this script on the back side.
  if (btn._asOnClick) btn.removeEventListener('click', btn._asOnClick);
  btn._asOnClick = function() { flip(true); };
  btn.addEventListener('click', btn._asOnClick);
  // Expose for the back template to call after autoplay fires.
  w._asTriggerPlaying = function() { flip(true); };
})();
</script>
