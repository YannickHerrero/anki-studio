{{FrontSide}}

<div class="js-card js-card--answer">
  <div class="js-card__inner">
    {{#Translation}}
    <div class="js-section">
      <div class="js-panel">
        <div class="js-rule">
          <span class="js-rule__bar"></span>
          <span class="js-rule__label">Meaning</span>
        </div>
        <div class="js-translation">{{Translation}}</div>
      </div>
    </div>
    {{/Translation}}

    {{#Vocabulary}}
    <div class="js-section">
      <div class="js-rule">
        <span class="js-rule__bar"></span>
        <span class="js-rule__label">Vocabulary</span>
      </div>
      <div class="js-vocabulary">{{Vocabulary}}</div>
    </div>
    {{/Vocabulary}}

    {{#Grammar}}
    <div class="js-section">
      <div class="js-panel">
        <div class="js-rule">
          <span class="js-rule__bar"></span>
          <span class="js-rule__label">Grammar</span>
        </div>
        <div class="js-grammar">{{Grammar}}</div>
      </div>
    </div>
    {{/Grammar}}

    {{#Notes}}
    <div class="js-section">
      <div class="js-panel">
        <div class="js-rule">
          <span class="js-rule__bar"></span>
          <span class="js-rule__label">Notes</span>
        </div>
        <div class="js-notes">{{Notes}}</div>
      </div>
    </div>
    {{/Notes}}
  </div>
</div>
